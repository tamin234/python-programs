<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fresh Veg Shop</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }
        .product-card img {
            height: 180px;
            object-fit: cover;
        }
        .price {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="#">🥕 Fresh Veg Shop</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Vegetables</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Fruits</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Cart 🛒</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Banner -->
<div class="container mt-4">
    <div class="p-5 text-white bg-success rounded">
        <h1>Fresh Vegetables & Fruits</h1>
        <p>Direct from farmers to your home 🚚</p>
    </div>
</div>

<!-- Product Section -->
<div class="container mt-4">
    <div class="row">

        <!-- Product 1 -->
        <div class="col-md-3">
            <div class="card product-card">
                <img src="https://via.placeholder.com/300x200" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Potato</h5>
                    <p class="price">৳ 40 / kg</p>
                    <button class="btn btn-success w-100">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-md-3">
            <div class="card product-card">
                <img src="https://via.placeholder.com/300x200" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Tomato</h5>
                    <p class="price">৳ 60 / kg</p>
                    <button class="btn btn-success w-100">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-md-3">
            <div class="card product-card">
                <img src="https://via.placeholder.com/300x200" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Apple</h5>
                    <p class="price">৳ 180 / kg</p>
                    <button class="btn btn-success w-100">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Product 4 -->
        <div class="col-md-3">
            <div class="card product-card">
                <img src="https://via.placeholder.com/300x200" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Banana</h5>
                    <p class="price">৳ 50 / dozen</p>
                    <button class="btn btn-success w-100">Add to Cart</button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 Fresh Veg Shop | All Rights Reserved
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
